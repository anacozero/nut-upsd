name: CI

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Lint Dockerfile
        # hadolint-action pinned to the v3.3.0 commit SHA (supply-chain hardening).
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5
        with:
          dockerfile: Dockerfile

      - name: Lint entrypoint
        run: shellcheck docker-entrypoint

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (amd64, no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: nut-upsd:pr
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities
        # trivy-action pinned to the v0.36.0 commit SHA. The tag namespace was
        # hijacked in a March 2026 supply-chain attack, so we never float on a tag.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: nut-upsd:pr
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
