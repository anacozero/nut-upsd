name: Build & Publish

on:
  push:
    branches: [master]
  schedule:
    # Monthly rebuild so the published image picks up Alpine security updates.
    - cron: "0 0 15 * *"
  workflow_dispatch:

permissions:
  contents: write   # push the version-bump commit
  packages: write   # push image to GHCR

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Bump patch version
        id: bump
        run: |
          old="$(cat VERSION)"
          major="${old%%.*}"; rest="${old#*.}"; minor="${rest%%.*}"; patch="${rest##*.}"
          new="${major}.${minor}.$((patch + 1))"
          echo "$new" > VERSION
          echo "version=$new" >> "$GITHUB_OUTPUT"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "Version $new [skip ci]"
          git push

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.bump.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
